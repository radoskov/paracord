# PaRacORD local agent — EXAMPLE configuration (reference only).
#
# The live config is written and rewritten by the CLI / local web GUI at
#     ~/.config/paracord/agent.yaml      (override the directory with $PARACORD_AGENT_HOME)
# You normally do NOT hand-edit it — use `paracord-agent add-folder`, `set-server`, etc. This file
# simply documents every field the agent actually reads (schema: paperracks_agent.config).
#
# Secrets are NOT stored here: the server bearer token and the web-GUI token live in the OS keyring
# (or a 0600 secrets file), set via `paracord-agent set-token`.

name: workstation-agent              # display name shown in the server's Admin -> Agents
server_url: http://127.0.0.1:8000    # PaRacORD server base URL (https strongly recommended off-loopback)
allow_insecure_http: false           # D3: must be true to talk plaintext http BEYOND loopback (token is sniffable)
ca_cert: null                        # path to a CA bundle for self-signed/internal-CA TLS (e.g. Caddy local CA)
agent_id: null                       # set automatically on `paracord-agent enroll`
refresh_interval: 30                 # seconds between scan+sync cycles in `paracord-agent start`
web_port: 8765                       # local-only web GUI port (`paracord-agent web up`)

# Defaults applied to newly-added folders/files (per-item values below override these):
default_action: index_only           # index_only | index_and_extract | teleport
default_teleport_policy: ask         # ask | allow

follow_symlinks: false               # if true, symlinked PDFs inside a watched root are indexed
auto_prune_unwatched: false          # keep-by-default: never drop unwatched-but-present files on sync
create_index_stubs: true             # create a library "stub" paper for each index_only file

# Watched folders (recursively scanned for *.pdf). Add via `paracord-agent add-folder <path>`.
folders:
  - path: ~/papers
    mode: monitored                  # monitored (re-scanned each cycle) | once
    action: index_only               # index_only | index_and_extract | teleport
    teleport_policy: ask             # ask | allow
    enabled: true                    # false pauses the folder without removing it

# Individually managed files. Add via `paracord-agent add-file <path>`.
files: []
