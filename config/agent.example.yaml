agent:
  name: workstation-agent
  server_url: http://127.0.0.1:8000
  token_file: ~/.config/paracord/agent.token
  database_file: ~/.local/share/paracord-agent/agent.sqlite3
  poll_interval_seconds: 30

filesystem:
  allowed_roots:
    - ~/papers
    - ~/projects
  follow_symlinks: false
  include_extensions:
    - .pdf
  exclude_globs:
    - "**/.git/**"
    - "**/__pycache__/**"
    - "**/node_modules/**"

scan:
  compute_sha256: true
  compute_quick_text_fingerprint: true
  max_file_size_mb: 512

teleport:
  enabled: true
  chunk_size_mb: 8
  verify_server_hash: true

streaming:
  enabled: true
  require_recent_server_nonce: true

logging:
  level: INFO
  file: ~/.local/share/paracord-agent/agent.log
