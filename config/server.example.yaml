server:
  name: paracord-server
  bind_host: 127.0.0.1
  bind_port: 8000
  public_base_url: http://127.0.0.1:8000
  allow_lan_access: false
  secret_key_env: PARACORD_SECRET_KEY

security:
  # No guest/anonymous access exists by design; the role set is asserted guest-free at startup.
  allowed_roles:
    - owner
    - editor
    - reader
  session_ttl_minutes: 720
  # Failed-login throttling (per username, in-process sliding window).
  login_max_failures: 5
  login_lockout_minutes: 15
  failed_login_lockout:
    enabled: true
    max_attempts: 8
    window_minutes: 15
  credential_recovery:
    method: server_console_only
    script: scripts/reset_admin_password.py

storage:
  managed_library_root: ./storage/library
  temp_root: ./storage/tmp
  max_upload_mb: 512
  content_addressed_layout: sha256_prefix
  # Server-folder imports can only use these configured aliases; APIs never accept
  # arbitrary filesystem paths to scan.
  server_allowed_roots:
    # - alias: papers
    #   path: /srv/paracord/imports/papers

agents:
  registration_enabled: true
  token_ttl_days: 180
  allow_pdf_streaming: true
  allow_teleport: true

services:
  database_url_env: DATABASE_URL
  redis_url_env: REDIS_URL
  grobid_url_env: GROBID_URL
  ollama_url_env: OLLAMA_URL

# External metadata enrichment. Outbound calls carry only bibliographic identifiers
# (titles, authors, DOIs, arXiv IDs, raw reference strings) and are audit-logged.
# See SECURITY.md "Data egress and privacy". Disable any source to keep it fully local.
metadata_enrichment:
  enabled: true
  sources:
    crossref: true
    arxiv: true
    openalex: true
    semantic_scholar: false
  overwrite_user_fields: false

# Find-on-web (#5): for a paper, search LEGITIMATE scholarly sources by title/authors/year,
# show candidate matches in a picker, and download+attach the ones the user selects. The
# server fetches PDFs over its own network, so IP-based institutional access to publisher PDFs
# applies. There is NO shadow-library source (Sci-Hub/LibGen/Z-Library/… are hard-refused on
# every redirect hop). Keyless by default; only Unpaywall needs an email (a polite-pool param).
web_find:
  enabled: true
  unpaywall_email: null        # null → falls back to metadata_enrichment.crossref_mailto
  max_candidates: 10
  per_source_timeout: 8.0      # seconds per source before it is flagged "degraded"
  total_budget: 25.0           # seconds wall-clock for the whole search
  download_timeout: 60.0       # seconds per PDF download
  max_download_bytes: 104857600  # 100 MB hard cap; oversized downloads are refused

processing:
  # Fast preview path: first-page text/thumbnails before the slower GROBID job.
  pdf_preview: pymupdf
  grobid:
    consolidate_header: true
    consolidate_citations: true
    # "crossref" calls the public API; "biblio_glutton" uses a local consolidation service.
    consolidation_backend: crossref
    biblio_glutton_url: null
    include_raw_citations: true
    include_raw_affiliations: true
    include_coordinates:
      - ref
      - biblStruct
      - s
      - p
      - figure
      - formula
    segment_sentences: true
  keywords:
    extractor: yake          # or keybert when embeddings are enabled
  ocr:
    enable_fallback: false   # detect needs_ocr always; run OCR only when enabled
    engine: ocrmypdf
  reference_parser_fallback: null   # null | anystyle | refextract
  advanced_extraction:       # optional ML PDF->markdown for hard documents
    nougat_enabled: false
    marker_enabled: false
  # Paper body summaries are tiered. Tier 0 (abstract) is always available; Tier 1
  # (extractive) is lightweight and needs no LLM; Tier 2 (local LLM) is opt-in.
  summaries:
    default_tier: abstract
    extractive_enabled: true
    extractive_engine: textrank          # via sumy (TextRank/LexRank), no LLM/GPU
    structured_sections: [method, experiment_data, results]
  ai:
    enabled: false                       # opt-in Tier-2 abstractive LLM summaries
    summary_model: qwen3:4b
    embedding_model: embeddinggemma
  # Lightweight keyword extraction (processing.keywords above) is the default. BERTopic
  # topic modeling is heavier and opt-in.
  topics:
    enabled: false
    default_scope: library

audit:
  enabled: true
  log_pdf_views: true
  log_exports: true
  retention_days: 365
