server:
  bind_host: 127.0.0.1
  bind_port: 8000
  public_base_url: http://127.0.0.1:8000
  allow_lan_access: false
  secret_key_env: PARACORD_SECRET_KEY

security:
  # No guest/anonymous access exists by design; the role set is asserted guest-free at startup.
  allowed_roles:
    - owner
    - editor
    - reader
  session_ttl_minutes: 720
  # Failed-login throttling (per username, in-process sliding window).
  login_max_failures: 5
  login_lockout_minutes: 15

storage:
  managed_library_root: ./storage/library
  # Server-folder imports can only use these configured aliases; APIs never accept
  # arbitrary filesystem paths to scan.
  server_allowed_roots:
    # - alias: papers
    #   path: /srv/paracord/imports/papers

services:
  database_url_env: DATABASE_URL
  redis_url_env: REDIS_URL
  grobid_url_env: GROBID_URL
  ollama_url_env: OLLAMA_URL
  # E1: rate limiting + queue-capacity fail OPEN when Redis is unreachable (correct for
  # single-user — a dead Redis must never take the API down). Set the env var
  # PARACORD_PRODUCTION_REQUIRE_REDIS=true on a LAN/production deployment to fail CLOSED instead:
  # Redis-dependent requests are rejected with 503 while Redis is down and the admin Jobs view
  # shows a red "limits unavailable" status. Read from the environment, not this file.

# External metadata enrichment. Outbound calls carry only bibliographic identifiers
# (titles, authors, DOIs, arXiv IDs, raw reference strings) and are audit-logged.
# See SECURITY.md "Data egress and privacy". Disable any source to keep it fully local.
metadata_enrichment:
  enabled: true
  sources:
    crossref: true
    arxiv: true
    openalex: true
    semantic_scholar: false

# Find-on-web (#5): for a paper, search LEGITIMATE scholarly sources by title/authors/year,
# show candidate matches in a picker, and download+attach the ones the user selects. The
# server fetches PDFs over its own network, so IP-based institutional access to publisher PDFs
# applies. There is NO shadow-library source (Sci-Hub/LibGen/Z-Library/… are hard-refused on
# every redirect hop). Keyless by default; only Unpaywall needs an email (a polite-pool param).
web_find:
  enabled: true
  unpaywall_email: null        # null → falls back to metadata_enrichment.crossref_mailto
  elsevier_api_key: null       # Article Retrieval API key (free: dev.elsevier.com) for fetching
                               # ScienceDirect PDFs (10.1016 DOIs) via Elsevier's official API;
                               # the Admin → Find-on-web runtime value overrides this. Also
                               # settable via the PARACORD_ELSEVIER_API_KEY env var.
  max_candidates: 10
  per_source_timeout: 8.0      # seconds per source before it is flagged "degraded"
  total_budget: 120.0          # seconds wall-clock for the whole search (backstop; the batch UI paces itself)
  download_timeout: 60.0       # seconds per PDF download
  max_download_bytes: 104857600  # 100 MB hard cap; oversized downloads are refused

# Reference→library matching ("likely local" citations). Links an extracted bibliography reference
# to a library work it likely IS, so refs for papers already in the library stop showing as
# "external" (and their Import stops creating near-duplicates). The runtime "use fuzzy as confirmed"
# toggle lives in Admin → Settings, not here.
reference_matching:
  enabled: true
  title_similarity_threshold: 90.0  # similarity_pct (0-100) for a fuzzy title match
  auto_accept_threshold: 90.0       # DEFAULT for the admin-editable "fuzzy auto-accept" threshold
                                    # (Admin → Settings → Reference matching); admins can change it
                                    # at runtime, but never below min_auto_accept_threshold
  min_auto_accept_threshold: 90.0   # hard floor for the admin-editable fuzzy threshold (yaml-only)
  high_confidence_threshold: 100.0  # "high-confidence auto-accept": score at/above which a fuzzy
                                    # match is auto-CONFIRMED even without a DOI/arXiv id when the
                                    # admin enables it; yaml-only, NOT admin-editable
  author_overlap_threshold: 0.5     # required author overlap (0-1) when both sides list authors
  require_year_match: true          # when both years are present they must agree (see year_tolerance)
  year_tolerance: 1                 # allowed |year difference| (preprint vs published drift); 0 = exact
  identifier_gate: true             # DOIs/arXiv ids present on both sides must match exactly

processing:
  grobid:
    consolidate_header: true
    consolidate_citations: true
    include_raw_citations: true
    include_coordinates:
      - ref
      - biblStruct
      - s
      - p
      - figure
      - formula
    segment_sentences: true
  ocr:
    # OCR pre-step (Phase B5). backend: none | ocrmypdf | full_ml.
    #   none     — GROBID runs on the PDF as-is (no OCR).
    #   ocrmypdf — (default) add a searchable text layer to scanned/poor-text PDFs before GROBID.
    #              Bounded local subprocess (ocrmypdf --skip-text); no network egress.
    #   full_ml  — route to an opt-in ML extractor (Nougat/Marker); activate-when-present, else
    #              degrades to GROBID. Requires the opt-in image (`make build-ml-extraction`).
    # The legacy `enable_fallback` boolean still works (true→ocrmypdf, false→none) when `backend`
    # is unset, but `backend` is preferred.
    backend: ocrmypdf
    timeout_seconds: 300            # per-file OCR wall-clock cap
    language: eng                   # tesseract language(s); add tesseract-ocr-<lang> to the image
    skip_if_text_layer_good: true   # skip OCR when the PDF already has a good text layer

