# PaRacORD development & evaluation stack.
#
# First run:  cp .env.example .env  &&  docker compose up -d --build
# Run tests:  docker compose run --rm api pytest
#
# Credentials come from the local .env file (gitignored). Never hardcode real
# credentials here — see docs/runbooks/secrets_management.md.
# Development Compose stack.
# Backend services build the `development` Dockerfile target, which includes
# pytest/ruff/dev tools and live bind mounts.
# Production should create and use docker-compose.prod.yml to select `production`.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      # Quoted so the ":?" default messages (which contain ":") stay valid YAML.
      POSTGRES_USER: "${POSTGRES_USER:?set POSTGRES_USER in .env (cp .env.example .env)}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (cp .env.example .env)}"
      POSTGRES_DB: "${POSTGRES_DB:?set POSTGRES_DB in .env (cp .env.example .env)}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - paperracks_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PaRacORD server (FastAPI). Runs DB migrations on start, then serves the API.
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    env_file: .env
    environment:
      PARACORD_ENV: development
      PARACORD_BIND_HOST: "0.0.0.0"
      # Don't write .pyc into the bind-mounted source tree (they'd be root-owned on the host).
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
      GROBID_URL: "http://grobid:8070"
      OLLAMA_URL: "http://ollama:11434"
      # Per-user UI preferences land on the persisted library volume (the container's ~/.config is
      # neither mounted nor persistent), so column choices survive restarts.
      PARACORD_PREFERENCES_PATH: "/app/storage/preferences.yaml"
      # Append-only audit-event file sink (D31.1) on the persisted library volume.
      PARACORD_AUDIT_LOG_PATH: "/app/storage/audit/audit.jsonl"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./pyproject.toml:/app/pyproject.toml
      # The safety suite's CSP/security-header test reads the committed nginx config; without
      # this read-only mount it skips inside `make test-safety` (the file otherwise only exists
      # in the frontend image).
      - ./frontend/nginx.conf:/app/frontend/nginx.conf:ro
      # Managed library: shared with the worker and persisted across restarts so uploaded/
      # teleported PDFs the API stores are readable by the extraction worker.
      - paperracks_library:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Grace period so a cold start that runs `alembic upgrade head` first isn't marked unhealthy
      # before the server is listening.
      start_period: 30s

  # RQ background worker — runs GROBID extraction (and later summaries/topics) jobs.
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    env_file: .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://redis:6379/0"
      GROBID_URL: "http://grobid:8070"
      PARACORD_AUDIT_LOG_PATH: "/app/storage/audit/audit.jsonl"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Gate the worker on the api being healthy: the api entrypoint runs `alembic upgrade head`, so
      # waiting for it guarantees the schema is at head before the worker queries any table on a cold
      # start (both containers share this backend image and its migration-on-start entrypoint).
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./pyproject.toml:/app/pyproject.toml
      # Same managed-library volume as the api, so the worker can read uploaded PDFs.
      - paperracks_library:/app/storage
    # Supervisor launches the owner-configured number of RQ workers (app_config.rq_worker_count,
    # read once at start). Change the count in the admin Settings, then restart this container.
    command: ["python", "-m", "app.workers.supervisor"]

  # PaRacORD local workstation agent (client). Idles by default; drive it with
  #   docker compose exec agent python -m paperracks_agent.cli --help
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PARACORD_SERVER_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./agent:/app/agent
      # Read-only so the agent test suite can validate config/agent.example.yaml against the real
      # AgentConfig schema (prevents the example drifting from the code — see test_example_config).
      - ./config:/app/config:ro
    command: ["sleep", "infinity"]

  # PaRacORD web frontend (Vite + Svelte). Dependencies live in the named
  # node_modules volume, not on the host bind mount.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    environment:
      VITE_API_BASE_URL: "http://127.0.0.1:8000"
    depends_on:
      api:
        condition: service_started
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - paperracks_frontend_node_modules:/app/frontend/node_modules

  # GROBID extraction service — only started with the "extraction" profile:
  #   docker compose --profile extraction up -d grobid
  # Uses the lightweight CRF-only image (~0.5 GB, CPU, no GPU) instead of the full
  # deep-learning image (~12 GB). It exposes the same REST API on :8070.
  grobid:
    image: lfoppiano/grobid:0.8.0
    profiles: ["extraction"]
    ports:
      - "127.0.0.1:8070:8070"
    # No container healthcheck: the CRF image ships without curl/wget. The app and
    # worker check GROBID liveness at call time (GrobidClient.is_alive / the job),
    # and nothing in this stack gates on grobid being "healthy".

  # Optional local LLM service — only with the "ai" profile.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - paperracks_ollama:/root/.ollama

volumes:
  paperracks_postgres:
  paperracks_ollama:
  paperracks_frontend_node_modules:
  paperracks_library:
