name: secret-scan

# Enforce the secrets policy (docs/runbooks/secrets_management.md) on every push and PR
# so a credential cannot reach the remote even if a local hook was skipped.

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan all tracked files for secrets
        run: python scripts/check_secrets.py --all
