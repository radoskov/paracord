name: ci

on:
  pull_request: null
  push: null

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    # Postgres lets the migration<->model parity test (backend/tests/test_migration_parity.py)
    # run `alembic upgrade head` against a real DB; it self-skips if this is absent.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: paperracks
          POSTGRES_PASSWORD: paperracks_dev_password
          POSTGRES_DB: paperracks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paperracks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://paperracks:paperracks_dev_password@localhost:5432/paperracks

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements-dev.txt
            agent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt -r agent/requirements.txt

      - name: Lint
        run: |
          ruff check backend agent scripts
          ruff format --check backend agent scripts

      - name: Test
        run: pytest

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
