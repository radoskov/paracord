server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (D2). Everything the SPA loads is same-origin/bundled, so the CSP is
    # 'self'-based, with two deliberate, documented relaxations:
    #   * connect-src also allows http:/https: because the API runs on a SEPARATE origin
    #     (VITE_API_BASE_URL, e.g. http://192.168.1.10:8000) baked into the bundle at build time;
    #     a 'self'-only connect-src would block every API call.
    #   * style-src allows 'unsafe-inline' for Svelte/Vite runtime-injected <style> tags, and
    #     worker-src allows blob: as a fallback path for the locally-bundled PDF.js worker.
    # `always` so the headers are sent on error responses too. Re-declared in the asset location
    # below because an add_header there would otherwise drop these inherited ones.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' http: https:" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Serve pre-compressed assets when available.
    gzip_static on;

    gzip on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # SPA routing: let the Svelte router handle all paths that are not static files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively. The security headers are repeated here because
    # this add_header block would otherwise suppress the inherited server-level ones (D2).
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; worker-src 'self' blob:; connect-src 'self' http: https:" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        access_log off;
    }
}
