server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available.
    gzip_static on;

    gzip on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # SPA routing: let the Svelte router handle all paths that are not static files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively.
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
