# PaRacORD theme — hand-editable source of truth.
# Compiled by `npm run themes:build` into src/lib/theme/themes.generated.ts.
#
# Catppuccin Latte (light) with a faint warm rosé/amber surface undertone and a
# warm-lead accent order (peach / maroon / yellow). GUI chrome uses Catppuccin
# pastels; the `graph` data palette is a VALIDATED derivative (see docs handoff),
# not the raw accents — raw Catppuccin fails the categorical validator.
id: latte-warm
name: "Latte (warm)"
mode: light
temperature: warm

# Catppuccin Latte reference ramp (documentation of the source hues).
palette:
  base: "#eff1f5"
  text: "#4c4f69"
  subtext1: "#5c5f77"
  subtext0: "#6c6f85"
  peach: "#fe640b"
  yellow: "#df8e1d"
  green: "#40a02b"
  teal: "#179299"
  blue: "#1e66f5"
  mauve: "#8839ef"
  red: "#d20f39"
  maroon: "#e64553"

tokens:
  surface: {base: "#f3efe9", raised: "#fbf8f4", overlay: "#fffdfb", sunken: "#ece6de", hover: "#efe8e0", selected: "#f1d4da", selected-border: "#a83250", selected-text: "#4c4f69"}
  ink: {strong: "#4c4f69", normal: "#565971", muted: "#5f6278", inverse: "#fffdfb"}
  border: {normal: "#dcd4ca", strong: "#c9c0b2", focus: "#1e66f5"}
  accent: {primary: "#a83250", primary-strong: "#8c2942", secondary: "#3a3c52", link: "#1a5fd0", note: "#7c34d6", note-bg: "#ece0fb", note-border: "#d0b8f2"}
  status:
    success: "#2a7130"
    success-bg: "#e2f3dc"
    success-border: "#b8dfa8"
    warning: "#8a5f10"
    warning-bg: "#fbeecf"
    warning-border: "#f0d69a"
    danger: "#fe5670" #fe5670 c4142f
    danger-bg: "#fbdfe3"
    danger-border: "#f0aebb"
    info: "#1a5fd0"
    info-bg: "#dde8fd"
    info-border: "#aec6f7"
  radius: {sm: "6px", md: "8px"}
  font: {family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif"}

# VALIDATED data palette (charts + network). Categorical passes the CVD validator
# on this surface (warm-lead order). See handoff for the recorded verdicts.
graph:
  surface: "#faf7f2"
  text: "#565971"
  axis_line: "#bcc0cc"
  split_line: "#dfe3ea"
  grid: "#dfe3ea"
  node_default: "#8c8fa1"
  edge: "#bcc0cc"
  tooltip_bg: "#4c4f69"
  tooltip_text: "#fffdfb"
  warning_ring: "#c4142f"
  font: "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif"
  categorical:
    - "#e06b00"
    - "#1f6fd6"
    - "#d23a52"
    - "#0a9aa0"
    - "#9a8400"
    - "#8f57d6"
    - "#cc489a"
    - "#2f8f3e"
  sequential:
    - "#df9153"
    - "#cd7a2c"
    - "#b56410"
    - "#8f4f0b"
    - "#6a3a08"
  diverging: {low: "#1a5fd0", mid: "#dfe3ea", high: "#c4142f"}
