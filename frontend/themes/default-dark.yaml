# PaRacORD theme — hand-editable source of truth (compiled by `npm run themes:build`).
#
# `default-dark` exists in P1 only to preserve the pre-existing DARK chart palette
# (the old resolveTheme('dark') output) as theme data. Its GUI is NOT wired to any
# `[data-theme]` on <html> yet, so it produces no visual change. The `tokens` below
# are a provisional dark mapping (surface/ink reuse the existing dark chart colours;
# accents/status reuse the shared brand hues) — the real dark GUI themes are designed
# and validated in Theming P2. Do not treat these token values as final.
id: default-dark
name: "Default (dark)"
mode: dark
temperature: cool

palette:
  bg: "#141a21"
  surface: "#1b232c"
  ink: "#e6edf3"
  muted: "#a8b3bf"
  border: "#3a4650"
  primary: "#4c72b0"
  blue: "#64b5cd"
  green: "#55a868"
  amber: "#ccb974"
  red: "#c44e52"

tokens:
  surface: {base: palette.bg, raised: palette.surface, overlay: palette.surface, sunken: palette.bg, hover: palette.surface}
  ink: {strong: palette.ink, normal: palette.ink, muted: palette.muted, inverse: palette.bg}
  border: {normal: palette.border, strong: palette.border, focus: palette.blue}
  accent: {primary: palette.primary, primary-strong: palette.blue, secondary: palette.muted, link: palette.blue}
  status: {success: palette.green, warning: palette.amber, danger: palette.red, info: palette.blue}
  radius: {sm: "6px", md: "8px"}
  font: {family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif"}

# The pre-existing DARK VizTheme, ported verbatim.
graph:
  surface: "#141a21"
  text: "#e6edf3"
  axis_line: "#3a4650"
  split_line: "#232c35"
  tooltip_bg: "#e6edf3"
  tooltip_text: "#141a21"
  font: "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif"
  categorical:
    - "#4c72b0"
    - "#dd8452"
    - "#55a868"
    - "#c44e52"
    - "#8172b3"
    - "#937860"
    - "#da8bc3"
    - "#8c8c8c"
    - "#ccb974"
    - "#64b5cd"
