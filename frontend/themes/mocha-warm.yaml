# PaRacORD theme — hand-editable source of truth.
# Compiled by `npm run themes:build` into src/lib/theme/themes.generated.ts.
#
# Catppuccin Mocha (dark) with a faint warm surface undertone and a warm-lead
# accent order (peach / rosewater / yellow). GUI chrome uses Catppuccin pastels;
# the `graph` palette is a VALIDATED derivative designed against the dark surface.
id: mocha-warm
name: "Mocha (warm)"
mode: dark
temperature: warm

palette:
  base: "#1e1e2e"
  text: "#cdd6f4"
  subtext1: "#bac2de"
  subtext0: "#a6adc8"
  overlay2: "#9399b2"
  peach: "#fab387"
  rosewater: "#f5e0dc"
  yellow: "#f9e2af"
  green: "#a6e3a1"
  teal: "#94e2d5"
  sky: "#89dceb"
  blue: "#89b4fa"
  mauve: "#cba6f7"
  red: "#f38ba8"
  maroon: "#eba0ac"

tokens:
  surface: {base: "#211e2a", raised: "#2a2536", overlay: "#322c40", sunken: "#191622", hover: "#423a54", selected: "#4a3826", selected-border: "#fab387", selected-text: "#f2e3d5"}
  ink: {strong: "#cdd6f4", normal: "#bac2de", muted: "#9399b2", inverse: "#1e1e2e"}
  border: {normal: "#3a3547", strong: "#4a4458", focus: "#89b4fa"}
  accent: {primary: "#fab387", primary-strong: "#f5a06a", secondary: "#bac2de", link: "#89b4fa", note: "#cba6f7", note-bg: "#2a2340", note-border: "#453a66"}
  status:
    success: "#a6e3a1"
    success-bg: "#22311f"
    success-border: "#3d5c3a"
    warning: "#f9e2af"
    warning-bg: "#332b17"
    warning-border: "#5c4f2a"
    danger: "#f38ba8"
    danger-bg: "#3a2029"
    danger-border: "#5c2f3a"
    info: "#89dceb"
    info-bg: "#17303a"
    info-border: "#2a5560"
  radius: {sm: "6px", md: "8px"}
  font: {family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif"}

graph:
  surface: "#211e2a"
  text: "#bac2de"
  axis_line: "#45475a"
  split_line: "#313244"
  grid: "#313244"
  node_default: "#6c7086"
  edge: "#585b70"
  tooltip_bg: "#cdd6f4"
  tooltip_text: "#1e1e2e"
  warning_ring: "#f38ba8"
  font: "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif"
  categorical:
    - "#cf7020"
    - "#4a7fd0"
    - "#e04a68"
    - "#1a9a9a"
    - "#a88a20"
    - "#a55fe0"
    - "#d85fa8"
    - "#2e9a52"
  sequential:
    - "#8a5218"
    - "#cf7020"
    - "#e0934a"
    - "#eeb37e"
    - "#f7d3b0"
  diverging: {low: "#4a7fd0", mid: "#45475a", high: "#e04a68"}
