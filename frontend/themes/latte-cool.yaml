# PaRacORD theme — hand-editable source of truth.
# Compiled by `npm run themes:build` into src/lib/theme/themes.generated.ts.
#
# Catppuccin Latte (light) with a faint cool blue/teal surface undertone and a
# cool-lead accent order (blue / teal / sapphire / lavender). GUI chrome uses
# Catppuccin pastels; the `graph` palette is a VALIDATED derivative (see handoff).
id: latte-cool
name: "Latte (cool)"
mode: light
temperature: cool

palette:
  base: "#eff1f5"
  text: "#4c4f69"
  subtext1: "#5c5f77"
  subtext0: "#6c6f85"
  blue: "#1e66f5"
  sapphire: "#209fb5"
  teal: "#179299"
  green: "#40a02b"
  yellow: "#df8e1d"
  mauve: "#8839ef"
  red: "#d20f39"
  lavender: "#7287fd"

tokens:
  surface: {base: "#edf0f5", raised: "#fafbfd", overlay: "#ffffff", sunken: "#e4e8f0", hover: "#e7ecf3", selected: "#d6e2f2", selected-border: "#245a8f", selected-text: "#4c4f69"}
  ink: {strong: "#4c4f69", normal: "#565971", muted: "#5f6278", inverse: "#ffffff"}
  border: {normal: "#cdd3de", strong: "#bcc4d2", focus: "#1e66f5"}
  accent: {primary: "#245a8f", primary-strong: "#1c4a78", secondary: "#3a3c52", link: "#1a5fd0", note: "#7c34d6", note-bg: "#ece0fb", note-border: "#d0b8f2"}
  status:
    success: "#2a7130"
    success-bg: "#e2f3dc"
    success-border: "#b8dfa8"
    warning: "#8a5f10"
    warning-bg: "#fbeecf"
    warning-border: "#f0d69a"
    danger: "#fe5670" #c4142f
    danger-bg: "#fbdfe3"
    danger-border: "#f0aebb"
    info: "#1a5fd0"
    info-bg: "#dde8fd"
    info-border: "#aec6f7"
  radius: {sm: "6px", md: "8px"}
  font: {family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif"}

graph:
  surface: "#f7f9fc"
  text: "#565971"
  axis_line: "#bcc4d2"
  split_line: "#dfe3ea"
  grid: "#dfe3ea"
  node_default: "#8c8fa1"
  edge: "#bcc4d2"
  tooltip_bg: "#4c4f69"
  tooltip_text: "#ffffff"
  warning_ring: "#c4142f"
  font: "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif"
  categorical:
    - "#1f6fd6"
    - "#e06b00"
    - "#0a9aa0"
    - "#d23a52"
    - "#8f57d6"
    - "#9a8400"
    - "#cc489a"
    - "#2f8f3e"
  sequential:
    - "#7ea6e9"
    - "#5c8fdf"
    - "#3f74d4"
    - "#2857aa"
    - "#163c78"
  diverging: {low: "#1a5fd0", mid: "#dfe3ea", high: "#c4142f"}
