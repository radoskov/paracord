# PaRacORD theme — hand-editable source of truth.
# This file is compiled by `npm run themes:build` into
# `src/lib/theme/themes.generated.ts`. Never hand-edit the generated file.
#
# `default` ports the CURRENT light appearance verbatim (Theming P1: no visual
# change). Token values equal the colours the app used before tokenisation.
id: default
name: "Default (light)"
mode: light
temperature: cool

# Named ramp the tokens draw from. `tokens`/`graph` values written as
# "palette.<key>" are resolved to the hex below at build time.
palette:
  bg: "#eef1f4"            # app background
  surface: "#fbfcfd"       # cards / header / modal panel
  white: "#ffffff"         # inputs, secondary buttons
  panel: "#f4f6f9"         # chips / empty states
  hover: "#eef2f6"         # secondary-button hover
  ink: "#1f2a36"           # primary text
  ink-body: "#203142"      # body text
  ink-accent: "#21303d"    # dark label on light buttons
  muted: "#64717f"         # muted text
  border: "#cbd5e1"        # default control border
  border-strong: "#d8dee6" # card / header border
  primary: "#2d3e50"       # primary button fill
  primary-strong: "#1f2a36" # primary button hover
  blue: "#2563eb"          # links / focus
  blue-strong: "#1d4ed8"   # info
  green: "#166534"         # success text
  amber: "#b45309"         # warning text
  red: "#b3261e"           # danger text

# Role tokens → CSS custom properties on [data-theme="default"].
tokens:
  surface: {base: palette.bg, raised: palette.surface, overlay: palette.white, sunken: palette.panel, hover: palette.hover}
  ink: {strong: palette.ink, normal: palette.ink-body, muted: palette.muted, inverse: palette.white}
  border: {normal: palette.border, strong: palette.border-strong, focus: palette.blue}
  accent: {primary: palette.primary, primary-strong: palette.primary-strong, secondary: palette.ink-accent, link: palette.blue}
  status: {success: palette.green, warning: palette.amber, danger: palette.red, info: palette.blue-strong}
  radius: {sm: "6px", md: "8px"}
  font: {family: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif"}

# Chart/network palette (feeds VizTheme). P1 keeps the current light chart look
# byte-for-byte; graph.font is the viz font, intentionally distinct from the GUI font.
graph:
  surface: "#ffffff"
  text: "#21303d"
  axis_line: "#bcc7d2"
  split_line: "#eef2f6"
  tooltip_bg: "#1f2a36"
  tooltip_text: "#ffffff"
  font: "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif"
  # Colorblind-aware categorical palette (Seaborn "deep", reordered for separation).
  categorical:
    - "#4c72b0"
    - "#dd8452"
    - "#55a868"
    - "#c44e52"
    - "#8172b3"
    - "#937860"
    - "#da8bc3"
    - "#8c8c8c"
    - "#ccb974"
    - "#64b5cd"
