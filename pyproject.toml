[project]
name = "paperracks-monorepo"
version = "0.0.0"
description = "Local-first scientific paper library and literature graph scaffold"
requires-python = ">=3.11"
readme = "README.md"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["backend/tests", "agent/tests"]
pythonpath = ["backend", "agent", "."]
# importlib mode lets the two test_security.py modules (backend + agent) coexist
# without an import-file-mismatch; "." on pythonpath makes `scripts` importable.
addopts = "--import-mode=importlib"
