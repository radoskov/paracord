[project]
name = "paperracks-monorepo"
version = "0.0.0"
description = "Local-first scientific paper library and literature graph scaffold"
requires-python = ">=3.11"
readme = "README.md"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["backend/tests", "agent/tests"]
pythonpath = ["backend", "agent"]
