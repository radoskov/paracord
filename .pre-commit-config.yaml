# Pre-commit hooks for PaRacORD.
#
# Install once:  pre-commit install
# Run manually:  pre-commit run --all-files
#
# The local secret scanner is dependency-free and is the primary guard. gitleaks is an
# optional second layer (requires network access on first install to fetch the binary).
repos:
  - repo: local
    hooks:
      - id: paracord-secret-scan
        name: PaRacORD secret scan
        entry: python scripts/check_secrets.py
        language: system
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: ^(backend|agent|scripts|frontend)/.*\.py$
      - id: ruff-format
        files: ^(backend|agent|scripts|frontend)/.*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^docs/.*\.tex$
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
        files: ^(backend|agent|scripts)/.*\.py$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - "--ignore-words-list=te,fo,aci"
        exclude: ^(frontend/package-lock\.json|docs/.*\.tex)$

  - repo: local
    hooks:
      - id: frontend-lock-check
        name: Check frontend package-lock sync
        entry: bash -c 'docker run --rm -v "$PWD/frontend:/app/frontend" -w /app/frontend node:24-bookworm-slim npm ci --ignore-scripts --dry-run'
        language: system
        pass_filenames: false
        files: ^frontend/(package\.json|package-lock\.json)$
