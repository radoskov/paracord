# Production compose overrides.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# This overlay:
#   * switches api + worker to the `production` Dockerfile target (runtime deps only,
#     gunicorn workers, no --reload)
#   * switches frontend to the `production` target (pre-built nginx static bundle)
#   * removes the source-code bind-mounts so the built image is self-contained
#   * sets PARACORD_ENV=production
#   * binds services to 127.0.0.1 for LAN-proxied deployments (adjust for your setup)
#   * adds a Caddy TLS reverse proxy (AUDIT D3): copy config/Caddyfile.example to
#     config/Caddyfile, set your LAN name/IP, and reach the app at https://... —
#     session + agent tokens then never cross the LAN in the clear.
#
# Credentials still come from .env — never store secrets in this file.
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    environment:
      PARACORD_ENV: production
      # Per-user UI preferences land on the persisted library volume (the container's ~/.config is
      # neither mounted nor persistent), so column choices survive restarts.
      PARACORD_PREFERENCES_PATH: "/app/storage/preferences.yaml"
    # No source bind-mounts (image is self-contained), but the managed library is persistent
    # data and must be shared with the worker.
    volumes:
      - paperracks_library:/app/storage

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    volumes:
      - paperracks_library:/app/storage

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
    environment:
      # VITE_API_BASE_URL is baked into the static bundle at build time, not runtime.
      # Behind the Caddy TLS proxy, set it to the SAME https origin as the site (NO :8000) so the SPA
      # calls the API same-origin and Caddy routes /api/* internally over TLS — e.g. in .env:
      #   VITE_API_BASE_URL=https://paracord.lan
      # (Pointing it at https://host:8000 would bypass Caddy and hit the API's plain port.)
      # See docs/SECURITY_TLS.md.
      {}
    ports:
      - "127.0.0.1:80:80"
    volumes: []    # Static bundle is baked into the image.

  # TLS termination (AUDIT D3). Caddy serves https for the SPA + API and proxies to the internal
  # services; with `tls internal` it runs a local CA for LAN certificates (trust its root.crt on
  # client machines + in the agent's `ca_cert`). Remove this service only for loopback-only use.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend

volumes:
  caddy_data:
  caddy_config:
